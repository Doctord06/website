<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <!-- Floating background slime -->
    <div class="slime-layer" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>

    <!-- Decorative drips -->
    <div class="top-drip top-drip-1" aria-hidden="true"></div>
    <div class="top-drip top-drip-2" aria-hidden="true"></div>
    <div class="top-drip top-drip-3" aria-hidden="true"></div>

    <!-- Main content -->
    <main class="hero">
      <section class="hero-card">
        <div class="hero-text">
          <span class="tag">Streamer • Slime • Yellow</span>
          <h1>Chap</h1>
          <p class="subtitle">
            just vibing... slightly sticky
          </p>
          <p class="description">
            A yellow slime streamer with tiny slime ball friends always hanging around.
            Soft chaos. Gooey vibes. Good times.
          </p>

          <div class="button-row">
            <a class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">Watch Stream</a>
            <a class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Join Discord</a>
          </div>
        </div>

        <div class="hero-art">
          <div class="character-wrap">
            <!-- Replace chap.png with the actual file name of Chap's image -->
            <img src="chap.png" alt="Chap yellow slime streamer character" class="chap-image" />

            <div class="friend friend-1" title="Slime friend"></div>
            <div class="friend friend-2" title="Slime friend"></div>
            <div class="friend friend-3" title="Slime friend"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
