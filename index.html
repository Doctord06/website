<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="background-glow" aria-hidden="true">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
      <div class="glow glow-3"></div>
    </div>

    <div class="page-slime" aria-hidden="true">
      <div class="slime-stream stream-1"></div>
      <div class="slime-stream stream-2"></div>
      <div class="slime-stream stream-3"></div>
    </div>

    <main class="hero">
      <section class="hero-card">
        <!-- slime hanging from top of card -->
        <div class="friend friend-top">
          <span class="eye left"></span>
          <span class="eye right"></span>
        </div>

        <div class="hero-art">
          <div class="character-wrap">
            <!-- replace this later with Chap PNG if you want -->
            <div class="chap-placeholder" aria-hidden="true">
              <div class="chap-eye left"></div>
              <div class="chap-eye right"></div>
              <div class="chap-drip chap-drip-1"></div>
              <div class="chap-drip chap-drip-2"></div>
              <div class="chap-drip chap-drip-3"></div>
            </div>
          </div>
        </div>

        <div class="hero-text">
          <div class="slime-stop slime-stop-pill">
            <!-- slime sitting on the tag -->
            <div class="friend friend-tag">
              <span class="eye left"></span>
              <span class="eye right"></span>
            </div>

            <span class="tag">Streamer • Slime • Yellow</span>
          </div>

          <div class="slime-stop slime-stop-title">
            <h1>Chap</h1>
          </div>

          <div class="slime-stop slime-stop-subtitle">
            <p class="subtitle">just vibing... slightly sticky</p>
          </div>

          <div class="slime-stop slime-stop-description">
            <p class="description">
              A yellow slime streamer with tiny slime ball friends always hanging around.
              Soft chaos. Gooey vibes. Good times.
            </p>
          </div>

          <div class="button-row">
            <a class="btn btn-primary" href="#">Watch Stream</a>
            <a class="btn btn-secondary" href="#">Join Discord</a>
          </div>
        </div>

        <!-- slime hanging off card edge -->
        <div class="friend friend-edge">
          <span class="eye left"></span>
          <span class="eye right"></span>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
